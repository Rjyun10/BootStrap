<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Customização do botão Uiverse.io para Bootstrap */
      .btn-uiverse {
        align-items: center;
        background-image: linear-gradient(
          144deg,
          #af40ff,
          #5b42f3 50%,
          #00ddeb
        );
        border: 0;
        border-radius: 8px;
        box-shadow: rgba(151, 65, 252, 0.2) 0 15px 30px -5px;
        box-sizing: border-box;
        color: #ffffff !important; /* Garante que o Bootstrap não mude a cor do texto */
        display: inline-flex; /* Mudado para inline-flex para se comportar como os botões do Bootstrap */
        font-size: 18px;
        justify-content: center;
        line-height: 1em;
        max-width: 100%;
        min-width: 140px;
        padding: 3px;
        text-decoration: none !important; /* Remove sublinhados caso use em tags <a> */
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-uiverse:active,
      .btn-uiverse:hover {
        outline: 0;
      }

      /* Estilo do texto interno */
      .btn-uiverse .btn-uiverse-content {
        background-color: rgb(5, 6, 45);
        padding: 16px 24px;
        border-radius: 6px;
        width: 100%;
        height: 100%;
        transition: 300ms;
        display: block; /* Garante o preenchimento correto do fundo */
        color: #ffffff;
      }

      /* Efeito Hover (passar o mouse) */
      .btn-uiverse:hover .btn-uiverse-content {
        background: none;
      }

      /* Efeito Click */
      .btn-uiverse:active {
        transform: scale(0.9);
      }
    </style>

    <title>Exercício 3</title>
  </head>
  <body class="bg-dark">
    <div class="container-md mt-5 align-items-center d-flex vh-100">
      <div class="row mx-3 w-100 justify-content-center">
        <div class="col-md-6">
          <div class="card p-5 shadow w-100">
            <h2 class="mb-4 text-center text-decoration-underline">
              Formulário de Contato
            </h2>
            <form>
              <div class="mb-4">
                <label>Nome Completo</label>
                <input type="text" class="form-control" />
              </div>
              <div class="mb-4">
                <label>E-mail</label>
                <input type="text" class="form-control" />
              </div>
              <div class="mb-4">
                <label>Assunto</label>
                <input type="text" class="form-control" />
              </div>
              <div class="form-floating mb-4">
                <label for="floatingTextarea">Mensagem</label>
                <textarea
                  class="form-control"
                  placeholder="Mensagem"
                  id="floatingTextarea"
                ></textarea>
              </div>
              <div class="form-check mb-4">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="checkDefault"
                />
                <label class="form-check-label" for="checkDefault">
                  Aceito receber novidades
                </label>
              </div>
              <div class="d-grid d-md-flex justify-content-md-end">
                <button type="button" class="btn-uiverse">
                  <span class="btn-uiverse-content">Enviar</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
