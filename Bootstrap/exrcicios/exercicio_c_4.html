<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Exercício 4</title>
  </head>
  <body class="bg-dark">
    <div class="container-md mt-5 align-items-center d-flex vh-100">
      <div class="row mx-3 w-100 justify-content-center">
        <div class="col-md-6">
          <div class="card p-5 shadow">
            <h2 class="mb-4 text-center text-decoration-underline">Login</h2>
            <form>
              <div class="mb-4">
                <label>E-mail</label>
                <input type="text" class="form-control" />
              </div>
              <div class="mb-4">
                <label>Senha</label>
                <input type="password" class="form-control" />
              </div>
              <div class="form-check mb-4">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="checkDefault"
                />
                <label class="form-check-label" for="checkDefault">
                  Lembrar-me
                </label>
              </div>
              <button type="button" class="btn btn-primary w-100">
                Entrar
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
