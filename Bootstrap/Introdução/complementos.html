<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style type="tex/css">

    </style>
    <title>Trabalho com Complementos</title>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-md-4 bg-info text-start">Texto alinhado à Esquerda</div>
        <div class="col-md-4 bg-warning text-center">Texto alinhado ao Centro</div>
        <div class="col-md-4 bg-success text-end">Texto alinhado à Direita</div>
      </div>
  </body>
</html>

<!--
    CLASSES:
        container -> Cria uma estrutura de box centralizada e responsiva
                    à partir da resolução 540px.

        row -> Cria uma estrutua de box similar a uma linha de uma tabela.

        col-md-4 -> Cria uma estrutua de box similar a uma coluna para a
                    classe row e divide em colunas que vai de 1 a 12.

        bg-info -> Determina a cor do background. (info, danger, success ...)

        text-start -> Alinha o texto a esquerda (horizontal).
        
        text-center -> Alinha o texto ao centro (horizontal).

        text-end -> Alinha o texto a direita (horizontal).
-->
